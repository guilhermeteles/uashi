<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Entrar — Uashi</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./_shell.css" />
  <style>
    body { background:var(--bg); }
    .social-btn { display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:var(--surface-2);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;color:var(--cream);font-family:var(--font-body);font-size:.875rem;font-weight:600;padding:13px;cursor:pointer;text-decoration:none;transition:border-color .2s; }
    .social-btn:hover { border-color:rgba(255,255,255,.3); }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/hugeicons@0.0.7/fonts/hugeicons.css" />
</head>
<body>
<div class="app-frame" style="max-width:390px;margin:0 auto;">
  <div style="padding:48px 24px 32px;display:flex;flex-direction:column;min-height:100vh;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(232,50,26,.1) 0%,transparent 60%),var(--bg);">

    <!-- Logo -->
    <div style="text-align:center;margin-bottom:40px;">
      <img src="../uashi-logo.svg" alt="Uashi" style="height:52px;width:auto;display:block;margin:0 auto 6px;" />
      <span style="height:3px;background:linear-gradient(90deg,#E8321A,#F5A800,#037BC9);width:48px;display:block;margin:0 auto;border-radius:2px;"></span>
      <p style="color:var(--muted);font-size:.875rem;margin-top:12px;">Entre na sua conta</p>
    </div>

    <!-- Social -->
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px;">
      <a href="index.html" class="social-btn">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuar com Google
      </a>
      <a href="index.html" class="social-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--cream)"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Continuar com Apple
      </a>
    </div>

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
      <hr style="flex:1;border:none;border-top:1px solid rgba(255,255,255,.08);" />
      <span style="font-size:.75rem;color:var(--muted);">ou entre com e-mail</span>
      <hr style="flex:1;border:none;border-top:1px solid rgba(255,255,255,.08);" />
    </div>

    <!-- Form -->
    <div style="display:flex;flex-direction:column;gap:14px;margin-bottom:20px;">
      <div class="form-group">
        <label class="form-label">E-mail ou CPF</label>
        <input type="text" class="form-input" placeholder="seu@email.com" value="carlos@email.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <div style="position:relative;">
          <input type="password" class="form-input" placeholder="••••••••" value="senha123" style="padding-right:44px;" />
          <button type="button" onclick="this.previousElementSibling.type=this.previousElementSibling.type==='password'?'text':'password'" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;">👁</button>
        </div>
      </div>
    </div>

    <a href="#" style="font-size:.8rem;color:var(--blue);text-align:right;display:block;margin-bottom:20px;text-decoration:none;">Esqueci minha senha</a>

    <a href="index.html" class="btn-primary" style="border-radius:14px;margin-bottom:16px;">Entrar</a>

    <p style="text-align:center;font-size:.85rem;color:var(--muted);">
      Não tem conta? <a href="../landing/cadastro.html" style="color:var(--red);font-weight:600;text-decoration:none;">Criar conta grátis</a>
    </p>

    <div style="flex:1;"></div>
    <p style="text-align:center;font-size:.7rem;color:rgba(107,107,107,.6);margin-top:24px;">
      Ao entrar você aceita nossos <a href="#" style="color:var(--muted);">Termos</a> e <a href="#" style="color:var(--muted);">Privacidade</a>
    </p>
  </div>
</div>
</body></html>
