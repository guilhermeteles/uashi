<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Créditos — Uashi</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./_shell.css" />
  <style>
    .amount-btn { background:var(--surface-2);border:2px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 10px;cursor:pointer;text-align:center;transition:all .2s;color:var(--cream); }
    .amount-btn.selected { border-color:var(--gold);background:rgba(245,168,0,.1); }
    .amount-btn:hover { border-color:rgba(245,168,0,.4); }
    .pay-method { background:var(--surface-2);border:2px solid rgba(255,255,255,.06);border-radius:12px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s; }
    .pay-method.selected { border-color:var(--blue); background:rgba(26,111,212,.06); }
    .pay-method:hover { border-color:rgba(26,111,212,.3); }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/hugeicons@0.0.7/fonts/hugeicons.css" />
</head>
<body>
<div class="app-frame" style="max-width:390px;margin:0 auto;">
  <div class="status-bar"><span class="status-time">09:41</span><div class="status-icons"><span>●●●</span><span>WiFi</span><span>🔋</span></div></div>
  <div class="top-bar">
    <a href="index.html" class="top-bar-back">←</a>
    <span class="top-bar-title">Adicionar Créditos</span>
  </div>
  <hr class="swoosh" />

  <div class="app-content">
    <div class="app-content-inner" style="display:flex;flex-direction:column;gap:20px;">

      <!-- Saldo atual -->
      <div style="background:linear-gradient(135deg,rgba(245,168,0,.2) 0%,rgba(245,168,0,.05) 100%),var(--surface);border:1px solid rgba(245,168,0,.2);border-radius:16px;padding:20px;text-align:center;">
        <div style="font-size:.72rem;color:rgba(245,168,0,.7);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">Saldo atual</div>
        <div style="font-family:var(--font-display);font-size:3rem;color:var(--gold);line-height:1;">R$&nbsp;120,00</div>
        <div style="font-size:.75rem;color:var(--muted);margin-top:4px;">equivale a ~3 lavagens completas</div>
      </div>

      <!-- Valor customizado -->
      <div>
        <div style="font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">Quanto você quer adicionar?</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;">
          <button class="amount-btn" onclick="selectAmt(this,'30')"><div style="font-family:var(--font-display);font-size:1.3rem;color:var(--cream);">R$ 30</div><div style="font-size:.65rem;color:var(--muted);">1 lavagem</div></button>
          <button class="amount-btn selected" onclick="selectAmt(this,'50')"><div style="font-family:var(--font-display);font-size:1.3rem;color:var(--gold);">R$ 50</div><div style="font-size:.65rem;color:var(--muted);">+ 5 bônus</div></button>
          <button class="amount-btn" onclick="selectAmt(this,'100')"><div style="font-family:var(--font-display);font-size:1.3rem;color:var(--cream);">R$ 100</div><div style="font-size:.65rem;color:var(--muted);">+ 15 bônus</div></button>
          <button class="amount-btn" onclick="selectAmt(this,'150')"><div style="font-family:var(--font-display);font-size:1.3rem;color:var(--cream);">R$ 150</div><div style="font-size:.65rem;color:var(--muted);">+ 30 bônus</div></button>
          <button class="amount-btn" onclick="selectAmt(this,'200')"><div style="font-family:var(--font-display);font-size:1.3rem;color:var(--cream);">R$ 200</div><div style="font-size:.65rem;color:var(--muted);">+ 50 bônus</div></button>
          <button class="amount-btn" onclick="openCustom()"><div style="font-size:1.2rem;">✏️</div><div style="font-size:.65rem;color:var(--muted);">Outro valor</div></button>
        </div>
        <div id="custom-wrap" style="display:none;">
          <input type="number" class="form-input" placeholder="R$ 0,00" min="10" step="10" style="text-align:center;font-size:1.1rem;font-weight:700;" />
        </div>
      </div>

      <!-- Forma de pagamento -->
      <div>
        <div style="font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">Forma de pagamento</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <label class="pay-method selected" onclick="selectPay(this)">
            <span style="font-size:1.4rem;">💳</span>
            <div style="flex:1;">
              <div style="font-weight:600;font-size:.875rem;color:var(--cream);">Cartão de crédito</div>
              <div style="font-size:.75rem;color:var(--muted);">Mastercard •••• 4821</div>
            </div>
            <div style="width:20px;height:20px;border-radius:50%;border:2px solid var(--blue);display:flex;align-items:center;justify-content:center;"><div style="width:10px;height:10px;border-radius:50%;background:var(--blue);"></div></div>
          </label>
          <label class="pay-method" onclick="selectPay(this)">
            <span style="font-size:1.4rem;">🟢</span>
            <div style="flex:1;">
              <div style="font-weight:600;font-size:.875rem;color:var(--cream);">Pix</div>
              <div style="font-size:.75rem;color:var(--muted);">Aprovação instantânea</div>
            </div>
            <div style="width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.2);"></div>
          </label>
          <label class="pay-method" onclick="selectPay(this)">
            <span style="font-size:1.4rem;">💳</span>
            <div style="flex:1;">
              <div style="font-weight:600;font-size:.875rem;color:var(--cream);">Débito</div>
              <div style="font-size:.75rem;color:var(--muted);">Adicionar cartão</div>
            </div>
            <div style="width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.2);"></div>
          </label>
        </div>
      </div>

      <!-- Resumo -->
      <div class="card" style="padding:16px;">
        <div style="display:flex;justify-content:space-between;font-size:.875rem;margin-bottom:6px;"><span style="color:var(--muted);">Valor</span><span style="color:var(--cream);">R$ 50,00</span></div>
        <div style="display:flex;justify-content:space-between;font-size:.875rem;margin-bottom:14px;"><span style="color:var(--muted);">Bônus</span><span style="color:#22c55e;">+ R$ 5,00</span></div>
        <hr style="border:none;border-top:1px solid rgba(255,255,255,.07);margin-bottom:14px;" />
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-weight:700;color:var(--cream);">Novo saldo</span>
          <span style="font-family:var(--font-display);font-size:1.6rem;color:var(--gold);">R$&nbsp;175,00</span>
        </div>
      </div>

      <a href="checkout.html" class="btn-gold" style="border-radius:14px;">Confirmar — R$ 50,00</a>

    </div>
  </div>

  <nav class="tab-bar">
    <a href="index.html" class="tab-item"><span class="tab-icon"><i class="hgi-stroke hgi-home-01"></i></span><span class="tab-label">Home</span></a>
    <a href="mapa.html" class="tab-item"><span class="tab-icon"><i class="hgi-stroke hgi-location-01"></i></span><span class="tab-label">Lojas</span></a>
    <a href="qrcode.html" class="tab-qr"><div class="tab-qr-btn">🔲</div></a>
    <a href="historico.html" class="tab-item"><span class="tab-icon"><i class="hgi-stroke hgi-task-01"></i></span><span class="tab-label">Histórico</span></a>
    <a href="conta.html" class="tab-item"><span class="tab-icon"><i class="hgi-stroke hgi-user-01"></i></span><span class="tab-label">Conta</span></a>
  </nav>
</div>
<script>
  function selectAmt(el, val) {
    document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('custom-wrap').style.display = 'none';
  }
  function openCustom() {
    document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
    const w = document.getElementById('custom-wrap');
    w.style.display = w.style.display === 'none' ? 'block' : 'none';
  }
  function selectPay(el) {
    document.querySelectorAll('.pay-method').forEach(p => {
      p.classList.remove('selected');
      const d = p.querySelector('div:last-child');
      if(d) d.innerHTML = '';
      if(d) d.style.borderColor = 'rgba(255,255,255,.2)';
    });
    el.classList.add('selected');
    const d = el.querySelector('div:last-child');
    if(d) { d.style.borderColor = 'var(--blue)'; d.innerHTML = '<div style="width:10px;height:10px;border-radius:50%;background:var(--blue);"></div>'; }
  }
</script>
</body></html>
