<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Login Admin — Uashi</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./_admin.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(232,50,26,.08) 0%,transparent 60%),var(--bg); }
    .login-wrap { width:100%; max-width:420px; padding:24px; }
    .otp-inputs { display:flex; gap:10px; justify-content:center; }
    .otp-in { width:52px; height:60px; background:var(--surface-2); border:2px solid rgba(255,255,255,.08); border-radius:12px; color:var(--cream); font-family:var(--font-display); font-size:1.8rem; text-align:center; outline:none; transition:border-color .2s; }
    .otp-in:focus { border-color:var(--red); }
    .role-btn { background:var(--surface-2); border:2px solid rgba(255,255,255,.06); border-radius:12px; padding:12px 14px; cursor:pointer; text-align:left; transition:all .2s; }
    .role-btn.selected { border-color:var(--red); background:rgba(232,50,26,.06); }
    .role-btn:hover { border-color:rgba(232,50,26,.3); }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/hugeicons@0.0.7/fonts/hugeicons.css" />
</head>
<body>
<div class="login-wrap">

  <!-- Step 1: Login -->
  <div id="step-login">
    <div style="text-align:center;margin-bottom:32px;">
      <img src="../uashi-logo.svg" alt="Uashi" style="height:44px;width:auto;display:block;margin:0 auto 6px;" />
      <span class="swoosh-sm" style="display:block;margin:0 auto 12px;"></span>
      <div style="font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;">Área administrativa</div>
    </div>

    <div style="background:var(--surface);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:24px;display:flex;flex-direction:column;gap:16px;">

      <!-- Perfil seletor -->
      <div>
        <div class="form-label" style="margin-bottom:8px;">Acessar como</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;" id="role-list">
          <button class="role-btn selected" onclick="selectRole(this)">
            <div style="font-size:1.2rem;margin-bottom:4px;">🏢</div>
            <div style="font-size:.8rem;font-weight:700;color:var(--cream);">Matriz</div>
            <div style="font-size:.65rem;color:var(--muted);">Visão global</div>
          </button>
          <button class="role-btn" onclick="selectRole(this)">
            <div style="font-size:1.2rem;margin-bottom:4px;">🏪</div>
            <div style="font-size:.8rem;font-weight:700;color:var(--cream);">Franqueado</div>
            <div style="font-size:.65rem;color:var(--muted);">Sua unidade</div>
          </button>
          <button class="role-btn" onclick="selectRole(this)">
            <div style="font-size:1.2rem;margin-bottom:4px;">🚛</div>
            <div style="font-size:.8rem;font-weight:700;color:var(--cream);">Frota</div>
            <div style="font-size:.65rem;color:var(--muted);">Gestão de frota</div>
          </button>
          <button class="role-btn" onclick="selectRole(this)">
            <div style="font-size:1.2rem;margin-bottom:4px;">👤</div>
            <div style="font-size:.8rem;font-weight:700;color:var(--cream);">Usuário</div>
            <div style="font-size:.65rem;color:var(--muted);">Painel pessoal</div>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" class="form-input" placeholder="admin@uashi.com.br" value="admin@uashi.com.br" />
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input type="password" class="form-input" placeholder="••••••••" value="admin123" />
      </div>

      <button class="btn-primary" onclick="goToMFA()" style="width:100%;justify-content:center;padding:12px;font-size:.875rem;border-radius:10px;">
        Entrar →
      </button>
    </div>

    <p style="text-align:center;font-size:.75rem;color:var(--muted);margin-top:16px;">
      <a href="../landing/index.html" style="color:var(--muted);">← Voltar para o site</a>
    </p>
  </div>

  <!-- Step 2: MFA -->
  <div id="step-mfa" style="display:none;">
    <div style="text-align:center;margin-bottom:28px;">
      <img src="../uashi-logo.svg" alt="Uashi" style="height:44px;width:auto;display:block;margin:0 auto 6px;" />
      <span class="swoosh-sm" style="display:block;margin:0 auto 12px;"></span>
      <div style="font-size:.9rem;font-weight:600;color:var(--cream);margin-bottom:4px;">Verificação em 2 etapas</div>
      <div style="font-size:.8rem;color:var(--muted);">Enviamos um código para admin@uashi.com.br</div>
    </div>

    <div style="background:var(--surface);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:28px 24px;display:flex;flex-direction:column;align-items:center;gap:20px;">
      <div class="otp-inputs">
        <input type="text" class="otp-in" maxlength="1" oninput="moveNext(this,0)" value="4" />
        <input type="text" class="otp-in" maxlength="1" oninput="moveNext(this,1)" value="2" />
        <input type="text" class="otp-in" maxlength="1" oninput="moveNext(this,2)" value="8" />
        <input type="text" class="otp-in" maxlength="1" oninput="moveNext(this,3)" value="0" />
        <input type="text" class="otp-in" maxlength="1" oninput="moveNext(this,4)" value="6" />
        <input type="text" class="otp-in" maxlength="1" value="1" />
      </div>
      <p style="font-size:.75rem;color:var(--muted);">Código válido por <strong style="color:var(--cream);">4:32</strong></p>
      <button class="btn-primary" onclick="window.location.href='index.html'" style="width:100%;justify-content:center;padding:12px;font-size:.875rem;border-radius:10px;">
        Verificar e entrar →
      </button>
      <button onclick="document.getElementById('step-mfa').style.display='none';document.getElementById('step-login').style.display='block'" style="background:none;border:none;color:var(--muted);font-size:.8rem;cursor:pointer;">← Voltar</button>
    </div>
  </div>

</div>
<script>
  function selectRole(el) {
    document.getElementById('role-list').querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
  }
  function goToMFA() {
    document.getElementById('step-login').style.display = 'none';
    document.getElementById('step-mfa').style.display = 'block';
  }
  function moveNext(el, idx) {
    const inputs = document.querySelectorAll('.otp-in');
    if (el.value && idx < 5) inputs[idx + 1].focus();
  }
</script>
</body></html>
